services:
  schedule-containers:
    image: ghcr.io/docker/schedule-containers:latest
    build: .
    ports:
      - "${HOST_PORT:-8080}:${WEB_PORT:-8080}"
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
      - DB_PATH=/data/schedule-containers.db
      - LOG_LEVEL=info
      - WEB_PORT=${WEB_PORT:-8080}
      - WEB_HOST=0.0.0.0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - schedule-containers-data:/data
    restart: unless-stopped

volumes:
  schedule-containers-data: