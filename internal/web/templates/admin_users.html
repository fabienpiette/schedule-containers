{{define "content"}}
<div class="page-header">
    <h2>Users</h2>
    <button class="btn-primary btn-sm" onclick="document.getElementById('create-user-form').hidden=false">Add User</button>
</div>

<div id="create-user-form" hidden style="margin-bottom:1.5rem;padding:1rem;background:var(--bg-surface);border:1px solid var(--border);border-radius:6px;">
    <form hx-post="/admin/users" hx-target="#users-table" hx-swap="outerHTML" onsubmit="this.closest('[hidden]').hidden=true">
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:0.75rem;align-items:end;">
            <div>
                <label style="font-size:0.75rem;color:var(--text-secondary)">Username</label>
                <input class="form-input" type="text" name="username" required>
            </div>
            <div>
                <label style="font-size:0.75rem;color:var(--text-secondary)">Password</label>
                <input class="form-input" type="password" name="password" required>
            </div>
            <div>
                <label style="font-size:0.75rem;color:var(--text-secondary)">Role</label>
                <select class="form-select" name="role">
                    <option value="reader">reader</option>
                    <option value="writer">writer</option>
                    <option value="admin">admin</option>
                </select>
            </div>
            <button class="btn-primary btn-sm" type="submit">Create</button>
        </div>
        {{if .Error}}<p style="color:var(--danger);font-size:0.875rem;margin-top:0.5rem">{{.Error}}</p>{{end}}
    </form>
</div>

{{template "users-table" .}}
{{end}}

{{define "users-table"}}
<table id="users-table" style="width:100%;border-collapse:collapse;">
    <thead>
        <tr style="border-bottom:1px solid var(--border);">
            <th style="text-align:left;padding:0.5rem 0.75rem;font-size:0.75rem;color:var(--text-secondary);">Username</th>
            <th style="text-align:left;padding:0.5rem 0.75rem;font-size:0.75rem;color:var(--text-secondary);">Role</th>
            <th style="text-align:left;padding:0.5rem 0.75rem;font-size:0.75rem;color:var(--text-secondary);">Created</th>
            <th style="padding:0.5rem 0.75rem;"></th>
        </tr>
    </thead>
    <tbody>
    {{range .Users}}{{template "users-row" .}}{{end}}
    </tbody>
</table>
{{end}}

{{define "users-row"}}
<tr id="user-{{.ID}}" style="border-bottom:1px solid var(--border);">
    <td style="padding:0.625rem 0.75rem;">{{.Username}}</td>
    <td style="padding:0.625rem 0.75rem;">
        <span class="badge {{if eq (print .Role) "admin"}}badge-warning{{else if eq (print .Role) "writer"}}badge-info{{else}}badge-success{{end}}">{{.Role}}</span>
    </td>
    <td style="padding:0.625rem 0.75rem;font-size:0.8rem;color:var(--text-secondary);">{{.CreatedAt.Format "2006-01-02"}}</td>
    <td style="padding:0.625rem 0.75rem;text-align:right;">
        <form style="display:inline-flex;gap:0.5rem;align-items:center;"
            hx-put="/admin/users/{{.ID}}" hx-target="#user-{{.ID}}" hx-swap="outerHTML">
            <select class="form-select" style="font-size:0.8rem;padding:0.25rem 0.5rem;" name="role">
                <option value="reader" {{if eq (print .Role) "reader"}}selected{{end}}>reader</option>
                <option value="writer" {{if eq (print .Role) "writer"}}selected{{end}}>writer</option>
                <option value="admin" {{if eq (print .Role) "admin"}}selected{{end}}>admin</option>
            </select>
            <input class="form-input" type="password" name="password" placeholder="new password" style="font-size:0.8rem;padding:0.25rem 0.5rem;width:130px;">
            <button class="btn-secondary btn-sm" type="submit">Save</button>
        </form>
        <button class="btn-danger btn-sm"
            hx-delete="/admin/users/{{.ID}}"
            hx-target="#user-{{.ID}}"
            hx-swap="outerHTML"
            hx-confirm="Delete user {{.Username}}?">Delete</button>
    </td>
</tr>
{{end}}
