{{template "layout" .}}

{{define "content"}}
<h1>New Schedule</h1>
<form id="schedule-form">
    <label for="container_name">Container</label>
    <select name="container_name" id="container_name" required>
        <option value="">Select a container...</option>
        {{range .Containers}}
        <option value="{{.Name}}">{{.Name}}</option>
        {{end}}
    </select>

    <label for="display_name">Display Name</label>
    <input type="text" name="display_name" id="display_name">

    <label for="start_preset">Start Cron Preset</label>
    <select id="start_preset">
        <option value="">-- Select a preset or type custom --</option>
        <optgroup label="Daily">
            <option value="0 0 * * *">Every day at 00:00</option>
            <option value="0 6 * * *">Every day at 06:00</option>
            <option value="0 7 * * *">Every day at 07:00</option>
            <option value="0 8 * * *">Every day at 08:00</option>
            <option value="0 9 * * *">Every day at 09:00</option>
            <option value="0 10 * * *">Every day at 10:00</option>
            <option value="0 12 * * *">Every day at 12:00</option>
            <option value="0 18 * * *">Every day at 18:00</option>
            <option value="0 20 * * *">Every day at 20:00</option>
            <option value="0 22 * * *">Every day at 22:00</option>
        </optgroup>
        <optgroup label="Weekdays">
            <option value="0 6 * * 1-5">Weekdays at 06:00</option>
            <option value="0 7 * * 1-5">Weekdays at 07:00</option>
            <option value="0 8 * * 1-5">Weekdays at 08:00</option>
            <option value="0 9 * * 1-5">Weekdays at 09:00</option>
        </optgroup>
        <optgroup label="Weekends">
            <option value="0 8 * * 0,6">Weekends at 08:00</option>
            <option value="0 9 * * 0,6">Weekends at 09:00</option>
        </optgroup>
        <optgroup label="Frequent">
            <option value="0 * * * *">Every hour</option>
            <option value="0 */2 * * *">Every 2 hours</option>
            <option value="0 */4 * * *">Every 4 hours</option>
            <option value="0 */6 * * *">Every 6 hours</option>
        </optgroup>
    </select>
    <label for="start_cron">Start Cron Expression</label>
    <input type="text" name="start_cron" id="start_cron" placeholder="0 8 * * 1-5" required>
    <small>Standard 5-field format: min hour day month weekday</small>

    <label for="stop_preset">Stop Cron Preset</label>
    <select id="stop_preset">
        <option value="">-- Select a preset or type custom --</option>
        <optgroup label="Daily">
            <option value="0 0 * * *">Every day at 00:00</option>
            <option value="0 6 * * *">Every day at 06:00</option>
            <option value="0 7 * * *">Every day at 07:00</option>
            <option value="0 8 * * *">Every day at 08:00</option>
            <option value="0 9 * * *">Every day at 09:00</option>
            <option value="0 10 * * *">Every day at 10:00</option>
            <option value="0 12 * * *">Every day at 12:00</option>
            <option value="0 18 * * *">Every day at 18:00</option>
            <option value="0 20 * * *">Every day at 20:00</option>
            <option value="0 22 * * *">Every day at 22:00</option>
        </optgroup>
        <optgroup label="Weekdays">
            <option value="0 17 * * 1-5">Weekdays at 17:00</option>
            <option value="0 18 * * 1-5">Weekdays at 18:00</option>
            <option value="0 19 * * 1-5">Weekdays at 19:00</option>
            <option value="0 20 * * 1-5">Weekdays at 20:00</option>
            <option value="0 22 * * 1-5">Weekdays at 22:00</option>
        </optgroup>
        <optgroup label="Weekends">
            <option value="0 22 * * 0,6">Weekends at 22:00</option>
        </optgroup>
        <optgroup label="Frequent">
            <option value="0 * * * *">Every hour</option>
            <option value="0 */2 * * *">Every 2 hours</option>
            <option value="0 */4 * * *">Every 4 hours</option>
            <option value="0 */6 * * *">Every 6 hours</option>
        </optgroup>
    </select>
    <label for="stop_cron">Stop Cron Expression</label>
    <input type="text" name="stop_cron" id="stop_cron" placeholder="0 18 * * 1-5" required>
    <small>Standard 5-field format: min hour day month weekday</small>

    <label>
        <input type="checkbox" name="enabled" checked> Enabled
    </label>

    <button type="submit">Create Schedule</button>
</form>

<script>
document.getElementById('start_preset').addEventListener('change', function() {
    if (this.value) {
        document.getElementById('start_cron').value = this.value;
    }
});
document.getElementById('stop_preset').addEventListener('change', function() {
    if (this.value) {
        document.getElementById('stop_cron').value = this.value;
    }
});

fetch('/api/presets')
    .then(r => r.json())
    .then(presets => {
        const categories = {};
        presets.forEach(p => {
            if (!categories[p.category]) categories[p.category] = [];
            categories[p.category].push(p);
        });
        ['start_preset', 'stop_preset'].forEach(selId => {
            const sel = document.getElementById(selId);
            Object.entries(categories).forEach(([cat, items]) => {
                const group = document.createElement('optgroup');
                group.label = cat;
                items.forEach(p => {
                    if (sel.querySelector('option[value="' + CSS.escape(p.expression) + '"]')) return;
                    const opt = document.createElement('option');
                    opt.value = p.expression;
                    opt.textContent = p.label;
                    group.appendChild(opt);
                });
                if (group.children.length > 0) sel.appendChild(group);
            }
        });
    });

document.getElementById('schedule-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const form = e.target;
    const data = {
        container_name: form.container_name.value,
        display_name: form.display_name.value,
        start_cron: form.start_cron.value,
        stop_cron: form.stop_cron.value,
        enabled: form.enabled.checked
    };
    try {
        const resp = await fetch('/api/schedules', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        if (resp.ok) {
            window.location.href = '/';
        } else {
            const text = await resp.text();
            alert('Error: ' + text);
        }
    } catch(err) {
        alert('Error: ' + err.message);
    }
});
</script>
{{end}}
