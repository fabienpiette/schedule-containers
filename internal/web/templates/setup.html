<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup - Schedule Containers</title>
    <link rel="stylesheet" href="/static/style.css">
    <script>
        (function(){
            var t=localStorage.getItem('theme');
            if(!t){t=window.matchMedia&&window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark';}
            document.documentElement.setAttribute('data-theme',t);
        })();
    </script>
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .auth-card { width: 100%; max-width: 400px; padding: 2rem; background: var(--bg-surface); border: 1px solid var(--border); border-radius: 8px; }
        .auth-card h1 { font-size: 1.25rem; margin: 0 0 0.5rem; }
        .auth-card p { font-size: 0.875rem; color: var(--text-secondary); margin: 0 0 1.5rem; }
        .auth-card .form-group { margin-bottom: 1rem; }
        .auth-card .form-group label { display: block; font-size: 0.875rem; color: var(--text-secondary); margin-bottom: 0.375rem; }
        .auth-card .btn-primary { width: 100%; margin-top: 0.5rem; }
        .auth-error { color: var(--danger); font-size: 0.875rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1>Create Admin Account</h1>
        <p>No accounts exist yet. Set up the first admin account to get started.</p>
        {{if .Error}}<p class="auth-error">{{.Error}}</p>{{end}}
        <form method="POST" action="/setup">
            <div class="form-group">
                <label for="username">Username</label>
                <input id="username" class="form-input" type="text" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" class="form-input" type="password" name="password" required>
            </div>
            <div class="form-group">
                <label for="confirm">Confirm Password</label>
                <input id="confirm" class="form-input" type="password" name="confirm" required>
            </div>
            <button class="btn-primary" type="submit">Create Admin Account</button>
        </form>
    </div>
</body>
</html>
