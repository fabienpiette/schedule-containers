<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Inter, system-ui, -apple-system, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            background: #0d1b2a;
            color: #e6edf3;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .wake-container {
            text-align: center;
            max-width: 400px;
            padding: 2rem;
        }
        .wake-container h1 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #1D63ED;
            margin-bottom: 1rem;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #1b2838;
            border-top: 3px solid #1D63ED;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 1.5rem auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            color: #f85149;
            margin-top: 1rem;
        }
        .error a {
            color: #1D63ED;
            text-decoration: none;
        }
        .error a:hover {
            text-decoration: underline;
        }
        .muted {
            color: #8899aa;
        }
    </style>
</head>
<body>
    <div class="wake-container">
        <h1>Starting {{.ContainerName}}</h1>
        <div class="spinner"></div>
        <div id="status" class="muted">Please wait...</div>
    </div>

    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <div hx-get="/wake/{{.ContainerName}}/status"
         hx-trigger="every 2s"
         hx-swap="innerHTML"
         hx-target="#status">
         Checking...
    </div>

    <script>
    setTimeout(function() {
        document.getElementById('status').innerHTML =
            '<p class="error">Container did not start in time. <a href="/wake/{{.ContainerName}}/">Retry</a></p>';
    }, 60000);
    </script>
</body>
</html>
