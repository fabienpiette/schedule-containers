{{template "layout" .}}

{{define "content"}}
<h1>Presets</h1>

<button class="btn-primary" onclick="document.getElementById('preset-dialog').showModal()">Create Preset</button>

<dialog id="preset-dialog" class="dialog-card">
  <form id="preset-form">
    <h2>Create Preset</h2>
    <div class="form-group">
        <label for="label">Label</label>
        <input type="text" name="label" id="label" class="form-input" placeholder="e.g. Weekdays at 10am" required>

        <label for="expression">Cron Expression</label>
        <input type="text" name="expression" id="expression" class="form-input" placeholder="0 10 * * 1-5" required>
        <small>Standard 5-field format: min hour day month weekday</small>

        <label for="category">Category</label>
        <input type="text" name="category" id="category" class="form-input" value="Custom">

        <label for="description">Description</label>
        <input type="text" name="description" id="description" class="form-input" placeholder="Weekdays at 10:00 AM">

        <button type="submit" class="btn-primary">Create Preset</button>
        <button type="button" class="btn-ghost" onclick="document.getElementById('preset-dialog').close()">Cancel</button>
    </div>
  </form>
</dialog>

{{if .Presets}}
<input type="text" id="preset-search" class="table-search" placeholder="Search presets...">
<table class="data-table" id="preset-table">
    <thead>
        <tr>
            <th data-sort="label">Label</th>
            <th data-sort="expression">Expression</th>
            <th data-sort="category">Category</th>
            <th data-sort="description">Description</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody id="preset-tbody" hx-get="/api/presets" hx-trigger="refreshList" hx-swap="innerHTML">
        {{template "preset-tbody" .}}
    </tbody>
</table>
{{else}}
<p class="muted">No presets found.</p>
{{end}}
{{end}}

{{define "scripts"}}
<script>
document.getElementById('preset-form').addEventListener('submit', function(e) {
    e.preventDefault();
    var form = e.target;
    var data = {
        label: form.label.value,
        expression: form.expression.value,
        category: form.category.value || 'Custom',
        description: form.description.value
    };
    fetch('/api/presets', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    }).then(function(r) {
        if (r.ok) {
            showToast('Preset created');
            document.getElementById('preset-dialog').close();
            document.getElementById('preset-form').reset();
            htmx.trigger('#preset-tbody', 'refreshList');
        } else {
            return r.text().then(function(t) { throw new Error(t); });
        }
    }).catch(function(err) {
        showToast(err.message, 'error');
    });
});
setupTable('preset-table','preset-search');
</script>
{{end}}
